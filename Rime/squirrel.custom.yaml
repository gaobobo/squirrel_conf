patch:
  style/color_scheme: slim-native_light
  style/color_scheme_dark: slim-native_dark

#  style/font_face: "SourceHanSansHC-Regular"  # 使用思源黑体


  preset_color_schemes:

    slim-native_light:
      name: Slim Native
      author: Bobby Gao
      license: MIT

      horizontal: true
      text_orientation: horizontal
      candidate_list_layout: linear

      font_point: 16
      label_font_point: 12

      corner_radius: 3
      hilited_corner_radius: 0
      border_height: -1
      border_width: 5
      translucency: true
      
      text_color: 0x5E5E5E
      back_color: 0xF7F7F7
      border_color: 0xDDDDDD
      label_color: 0x8A8A8A
      candidate_text_color: 0x1F1F1F
      comment_text_color: 0x8C8C8C
      hilited_text_color: 0x7A7A7A
      hilited_back_color: 0xFF7A00
      hilited_candidate_text_color: 0xFFFFFF
      hilited_candidate_label_color: 0xFFFFFF
      hilited_comment_text_color: 0xFFF1E6

    slim-native_dark:
      name: Slim Native Dark
      author: Bobby Gao
      license: MIT

      horizontal: true
      text_orientation: horizontal
      candidate_list_layout: linear

      font_point: 16
      label_font_point: 12

      corner_radius: 3
      hilited_corner_radius: 0
      border_height: -1
      border_width: 5
      translucency: true
      
      text_color: 0xD0D0D0
      back_color: 0x1F1F1F
      border_color: 0x2C2C2C
      label_color: 0x808080
      candidate_text_color: 0xF2F2F2
      comment_text_color: 0x909090
      hilited_text_color: 0xB8B8B8
      hilited_back_color: 0xC76707
      hilited_candidate_text_color: 0xFFFFFF
      hilited_candidate_label_color: 0xFFFFFF
      hilited_comment_text_color: 0xFFE7CC

